<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel</title>
    <style>
        :root {
            --bg-site: #EAF6FB;
            --cor-primaria: #333;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-site);
            color: var(--cor-primaria);
            transition: background-color 0.5s ease;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* ── Barra de botões ── */
        .barra {
            display: flex;
            gap: 10px;
        }

        .barra button {
            padding: 8px 18px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .barra button:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

        /* ── Overlay compartilhado ── */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }

        /* ── Modal base ── */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #ccc;
            background: white;
            z-index: 1000;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ── Modal Configurações ── */
        #popupConfig.active {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* ── Modal Usuário ── */
        #popupUsuario.active {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 80%;
            max-width: 900px;
            min-height: 400px;
            padding: 40px;
        }

        /* ── Conteúdo de Configurações ── */
        .color-options, .color-classic, .custom-theme-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .custom-theme-area {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #ccc;
            flex-direction: column;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .btn-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-color:hover { transform: scale(1.1); }

        .color-1  { background-color: #fce7f3; border-color: #db2777; }
        .color-2  { background-color: #d1fae5; border-color: #059669; }
        .color-3  { background-color: #2d3436; border-color: #000000; }
        .color-4  { background-color: #b698c7; border-color: #8f60aa; }
        .color-5  { background-color: #ffffff;  border-color: #c5c5c5; }
        .color-6  { background-color: #f0a24a; border-color: #f08000; }
        .color-7  { background-color: #EAF6FB; border-color: #90deff; }
        .color-8  { background-color: #fff067; border-color: #f0d800; }
        .color-9  { background-color: #F5F5DC; border-color: #3E2723; }
        .color-10 { background-color: #ff6a6a; border-color: #701100; }

        /* ── Conteúdo de Usuário ── */
        #popupUsuario center img { width: 30%; height: auto; }

        .close-btn {
            align-self: flex-end;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Botões para abrir os popups -->
    <div class="barra">
        <button id="openConfig">⚙️ Configurações</button>
        <button id="openUsuario">👤 Usuário</button>
    </div>

    <!-- Overlay único -->
    <div class="overlay" id="overlay"></div>

    <!-- ════════════════════════════════
         POPUP: CONFIGURAÇÕES
    ════════════════════════════════ -->
    <div class="modal" id="popupConfig">
        <button class="close-btn" id="closeConfig">
            <b style="font-size: 20px;">✕</b>
        </button>

        <h2 style="text-align:center; color:#242424; margin:0; font-size:40px; font-weight:bold;">Configurações</h2><br>
        <h2 style="text-align:center; color:#242424; margin:0;">Personalizar</h2>

        <p style="text-align:center; color:#494949; margin-bottom:5px;">Temas:</p>
        <div class="color-options">
            <button class="btn-color color-1"  onclick="mudarCor('#fce7f3','#db2777')"></button>
            <button class="btn-color color-2"  onclick="mudarCor('#d1fae5','#059669')"></button>
            <button class="btn-color color-3"  onclick="mudarCor('#2d3436','#ffffff')"></button>
            <button class="btn-color color-4"  onclick="mudarCor('#8f60aa','#000000')"></button>
            <button class="btn-color color-5"  onclick="mudarCor('#ffffff','#000000')"></button>
            <button class="btn-color color-6"  onclick="mudarCor('#f0a24a','#000000')"></button>
            <button class="btn-color color-8"  onclick="mudarCor('#fff067','#000000')"></button>
            <button class="btn-color color-9"  onclick="mudarCor('#F5F5DC','#3E2723')"></button>
            <button class="btn-color color-10" onclick="mudarCor('#ff6a6a','#701100')"></button>
        </div>

        <hr style="width:100%; margin:20px 0; border:0; border-top:1px solid #eee;">
        <p style="text-align:center; color:#313131; margin-bottom:10px;">Criar seu Tema:</p>
        <div class="custom-theme-area">
            <div class="input-group">
                <label style="color:#000;">Fundo:</label>
                <input type="color" id="inputBg" value="#EAF6FB">
            </div>
            <div class="input-group">
                <label style="color:#000;">Texto:</label>
                <input type="color" id="inputTexto" value="#333333">
            </div>
        </div>

        <p style="text-align:center; color:#242424; margin-top:15px;">Tema clássico:</p>
        <div class="color-classic">
            <button class="btn-color color-7" onclick="mudarCor('#EAF6FB','#000000')"></button>
        </div>
    </div>

    <!-- ════════════════════════════════
         POPUP: USUÁRIO
    ════════════════════════════════ -->
    <div class="modal" id="popupUsuario">
        <button class="close-btn" id="closeUsuario">
            <img src="fechar.png" alt="X" style="width:30px; display:block;"
                 onerror="this.parentElement.innerHTML='✕'">
        </button>

        <p>Usuário:</p><br>
        <center>
            <a href="Login.html">Login necessário</a>
            <br><br>
            <img src="user.png" alt="Avatar do usuário">
            <p>Nome de usuário:</p><br>
            <p>E-mail:</p>
        </center>
    </div>

    <script>
        const overlay     = document.getElementById('overlay');

        // — Configurações —
        const popupConfig  = document.getElementById('popupConfig');
        const openConfig   = document.getElementById('openConfig');
        const closeConfig  = document.getElementById('closeConfig');

        // — Usuário —
        const popupUsuario  = document.getElementById('popupUsuario');
        const openUsuario   = document.getElementById('openUsuario');
        const closeUsuario  = document.getElementById('closeUsuario');

        // Inputs do criador de temas
        const inputBg     = document.getElementById('inputBg');
        const inputTexto  = document.getElementById('inputTexto');

        /* Abre um popup e fecha qualquer outro que esteja aberto */
        function abrirPopup(popup) {
            fecharTodos();
            popup.classList.add('active');
            overlay.classList.add('active');
        }

        function fecharTodos() {
            [popupConfig, popupUsuario].forEach(p => p.classList.remove('active'));
            overlay.classList.remove('active');
        }

        function mudarCor(fundo, texto) {
            document.documentElement.style.setProperty('--bg-site', fundo);
            document.documentElement.style.setProperty('--cor-primaria', texto);
            inputBg.value    = fundo;
            inputTexto.value = texto;
        }

        // Eventos de abertura
        openConfig.addEventListener('click',  () => abrirPopup(popupConfig));
        openUsuario.addEventListener('click', () => abrirPopup(popupUsuario));

        // Eventos de fechamento
        closeConfig.addEventListener('click',  fecharTodos);
        closeUsuario.addEventListener('click', fecharTodos);
        overlay.addEventListener('click',      fecharTodos);

        // Criador de tema personalizado
        inputBg.addEventListener('input', () =>
            document.documentElement.style.setProperty('--bg-site', inputBg.value));
        inputTexto.addEventListener('input', () =>
            document.documentElement.style.setProperty('--cor-primaria', inputTexto.value));
    </script>

</body>
</html>
