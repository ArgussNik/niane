<!DOCTYPE html>
<html lang="en">
<head>
  <title>NIANE — Produtividade</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EAF6FB;
      --surface: #ffffff;
      --surface2: #D8F0FA;
      --accent: #5BC4E8;
      --accent2: #3AADD4;
      --accent-soft: #B2E6F5;
      --text: #1a2b35;
      --text-muted: #6b8fa0;
      --radius: 18px;
      --sidebar-w: 220px;
      --sidebar-b: 350px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar*/
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      padding: 32px 18px 24px;
      border-right: 1.5px solid var(--accent-soft);
      box-shadow: 2px 0 18px rgba(60,160,200,0.06);
      flex-shrink: 0;
      z-index:10;
    }

    /* Sidebar Azul */
    .sidebar2 {
      width: var(--sidebar-b);
      height: 100vh;
      background: var(--accent-soft);
      display: flex;
      flex-direction: column;
      padding: 32px 18px 24px;
      border-left: 1.5px solid var(--accent);
      box-shadow: -2px 0 18px rgba(60,160,200,0.06);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent2);
      margin-bottom: 36px;
      padding-bottom: 18px;
      border-bottom: 1.5px solid var(--accent-soft);
    }
    .logo span { color: var(--text); }

    nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 11px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      user-select: none;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--accent2); }

    .nav-item.ativo {
      background: var(--accent-soft);
      color: var(--accent2);
      font-weight: 600;
    }

    .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 16px;
      border-top: 1.5px solid var(--accent-soft);
    }

    /* Principal */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Progresso */
    .circle-1 {
      height: 500px;
      width: 500px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: conic-gradient(var(--accent2) 0%, #e0e0e0 0%);
      transition: background 0.5s ease;
    }

    .circle-2 {
      height: 460px;
      width: 460px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .prog-num {
      font-family: 'Syne', sans-serif;
      font-size: 5.5rem;
      font-weight: 800;
      line-height: 1;
    }

    .prog-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-top: 10px;
    }


    .sidebar2-title {
        font-family: 'Syne', sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 20px;
    }
    .task-card {
        background: var(--surface);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    .check-icon { color: #2ecc71; font-weight: bold; }
    
    .done-total-box {
        margin-top: auto;
        background: var(--accent2);
        color: white;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
    }
  </style>
</head>
<body>

  <!-- SideBar Branco -->
  <aside class="sidebar">
    <div class="logo">NI<span>ANE</span></div>
    <nav>
      <a class="nav-item ativo" href="#">🏠 Home</a>
      <a class="nav-item" href="#">⏱ Pomodoro</a>
      <a class="nav-item" href="#">✓ My Lists</a>
      <a class="nav-item" href="#">📄 Notes</a>
      <a class="nav-item" href="#">🎵 Música</a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-item" href="#">👤 Usuário</a>
      <a class="nav-item" href="#">⚙️ Configurações</a>
    </div>
  </aside>




  <main>
    <div style="text-align: center; margin-bottom: 20px;">
      Tempo Total de Pomodoro: <br>
      Horas: 0 | Minutos: 0
    </div>
  
    <div class="circle-1" id="outer-circle">
      <div class="circle-2">
        <span class="prog-num" id="percentage-text">0%</span>
        <span class="prog-label">Progresso Total</span>
      </div>
    </div>
  </main>
  


<!-- SideBar Azul -->
  <aside class="sidebar2">
    <h2 class="sidebar2-title">Listas</h2>
    
    <div id="done-list">
        <div class="task-card">
            <span class="check-icon">✓</span>
            <div>
                <p style="font-weight: 600; font-size: 0.9rem;">Limpurde</p>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Listurde</p>
            </div>
        </div>
        <div class="task-card">
            <span class="check-icon">✓</span>
            <div>
                <p style="font-weight: 600; font-size: 0.9rem;">Emailurde</p>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Traburde</p>
            </div>
        </div>
        <div class="task-card">
            <span class="check-icon">✓</span>
            <div>
                <p style="font-weight: 600; font-size: 0.9rem;">Aguarde</p>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Personurde</p>
            </div>
        </div>

    <div class="task-card">
      <span class="check-icon">✓</span>
      <div>
          <p style="font-weight: 600; font-size: 0.9rem;">Sahurde</p>
          <p style="font-size: 0.75rem; color: var(--text-muted);">Gugu</p>
      </div>
  </div>


<!-- Apenas adiciona Tasks acima para subir -->
</div>

    <div class="done-total-box">
      <span id="task-count" style="font-size: 2.5rem; font-weight: 800; display: block;">0</span>
      <p style="font-size: 0.8rem; opacity: 0.9;">LISTAS PRONTAS</p>
    </div>
  </aside>

  <script>
    function updateProgress() {
      const tasksDone = document.getElementById('done-list').children.length;
      const totalGoal = 6;
      
      const percentage = Math.min(Math.round((tasksDone / totalGoal) * 100), 100);
      
      document.getElementById('percentage-text').innerText = percentage + "%";
      document.getElementById('task-count').innerText = tasksDone;
      
      const circle = document.getElementById('outer-circle');
      circle.style.background = `conic-gradient(var(--accent2) ${percentage}%, #d1e9f2 ${percentage}%)`;
    }

    window.onload = updateProgress;
  </script>

</body>
</html>
