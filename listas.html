<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas</title>
  <link rel="stylesheet" href="listas.css">
  <style>
  

    /* ── Ajustes de layout ── */
    .content { overflow-y: auto; }
    .list-titles { overflow-x: auto; padding-bottom: 4px; }
    .lists-row   { overflow-x: auto; padding-bottom: 8px; }
    .list-title  { min-width: 280px; }

    /* ── Cursor pointer nas tarefas ── */
    .task-item { cursor: pointer; }
    .task-item:hover { background: #eef8ff; }

    /* ── Seção de concluídas ── */
    .done-section { margin-top: 6px; }
    .done-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 700; color: var(--text-secondary);
      cursor: pointer; padding: 6px 8px; border-radius: 8px;
      user-select: none; transition: background .1s;
    }
    .done-toggle:hover { background: #eef8ff; }
    .done-toggle .arrow { font-size: 13px; transition: transform .2s; display: inline-block; }
    .done-toggle.open .arrow { transform: rotate(90deg); }
    .done-list { display: none; flex-direction: column; gap: 8px; margin-top: 4px; }
    .done-list.visible { display: flex; }

    /* ── Botão "Adicionar tarefa" simples ── */
    .add-task-simple {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; color: var(--accent2, #1f8ecd);
      font-size: 0.84rem; font-weight: 600;
      padding: 8px 6px; border-radius: 8px; transition: background .1s;
    }
    .add-task-simple:hover { background: #eef8ff; }
    .add-task-simple .plus { font-size: 18px; line-height: 1; }

    /* ── Composer expandido ── */
    .task-composer-wrap { display: none; }
    .task-composer-wrap.open { display: block; }
    .task-composer {
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--card-bg);
      display: flex; flex-direction: column; gap: 6px;
    }
    .task-title-input {
      width: 100%; border: none; outline: none;
      font-size: 0.88rem; color: var(--text-primary);
      background: transparent; font-family: inherit; font-weight: 600;
    }
    .task-title-input::placeholder { color: var(--text-muted); font-weight: 400; }
    .task-notes-input {
      width: 100%; border: none; outline: none;
      font-size: 0.8rem; color: var(--text-secondary);
      background: transparent; resize: none; font-family: inherit; min-height: 32px;
    }
    .task-notes-input::placeholder { color: var(--text-muted); }

    /* botões de meta (data/prioridade) */
    .composer-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .meta-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.75rem; color: var(--text-secondary);
      background: #eef8ff; border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 10px;
      cursor: pointer; font-family: inherit; transition: background .1s;
    }
    .meta-btn:hover { background: #d8eef9; }
    .meta-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

    /* rows de data e prioridade */
    .date-picker-row {
      display: none; gap: 8px; align-items: center; flex-wrap: wrap;
      background: #eef8ff; border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px;
    }
    .date-picker-row.open { display: flex; }
    .date-picker-row label { font-size: 0.75rem; color: var(--text-muted); }
    .date-picker-row input[type="date"],
    .date-picker-row input[type="time"] {
      font-size: 0.8rem; border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 7px;
      font-family: inherit; background: #fff; color: var(--text-primary); outline: none;
    }
    .priority-row { display: none; gap: 6px; align-items: center; }
    .priority-row.open { display: flex; }
    .priority-row label { font-size: 0.75rem; color: var(--text-muted); }
    .priority-row select {
      font-size: 0.8rem; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px;
      font-family: inherit; background: #fff; color: var(--text-primary); outline: none;
    }

    /* rodapé do composer */
    .composer-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      border-top: 1px dashed #dcebf2; padding-top: 8px;
    }
    .btn-cancel {
      font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      background: none; border: none; cursor: pointer;
      padding: 6px 12px; border-radius: 999px; font-family: inherit; transition: background .1s;
    }
    .btn-cancel:hover { background: #eef8ff; }
    .btn-add {
      font-size: 0.8rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #5BC4E8, #1f8ecd);
      border: none; cursor: pointer; padding: 6px 16px;
      border-radius: 999px; font-family: inherit; transition: opacity .1s;
    }
    .btn-add:hover { opacity: .88; }

    /* ── Fade out ── */
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; transform:translateX(8px); } }
    .task-fade-out { animation: fadeOut 0.4s ease forwards; }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed; background: #fff;
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 6px 24px rgba(30,100,140,.13);
      z-index: 200; min-width: 180px; padding: 4px 0; display: none;
    }
    .ctx-menu.open { display: block; }
    .ctx-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; font-size: 0.88rem; color: var(--text-primary);
      cursor: pointer; transition: background .1s;
    }
    .ctx-item:hover { background: #eef8ff; }
    .ctx-item.danger { color: #c94b4b; }
    .ctx-item.danger:hover { background: #ffe7e7; }
    .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Modais ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--modal-overlay); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 420px; margin: 16px;
      overflow: hidden; box-shadow: 0 8px 40px rgba(30,100,160,.18);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 0;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-secondary);
      padding: 4px 8px; border-radius: 6px; line-height: 1;
    }
    .modal-close:hover { background: #eef8ff; }
    .modal-body { padding: 16px 20px 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: var(--text-muted); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .modal-field input[type="text"],
    .modal-field input[type="date"],
    .modal-field input[type="time"],
    .modal-field textarea,
    .modal-field select {
      width: 100%; font-size: 0.88rem; font-family: inherit;
      color: var(--text-primary); background: #f7fcff;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 12px; outline: none; transition: border-color .15s;
    }
    .modal-field input:focus,
    .modal-field textarea:focus,
    .modal-field select:focus { border-color: var(--accent); }
    .modal-field textarea { resize: vertical; min-height: 60px; }
    .modal-field-row { display: flex; gap: 10px; }
    .modal-field-row .modal-field { flex: 1; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 12px 20px; border-top: 1px solid var(--border); background: #f7fcff;
    }
    .modal-btn-delete {
      margin-right: auto; font-size: 0.82rem; font-weight: 600;
      color: #c94b4b; background: none; border: 1px solid #f5c6c6;
      border-radius: 999px; padding: 6px 14px; cursor: pointer; font-family: inherit;
    }
    .modal-btn-delete:hover { background: #ffe7e7; }
    .modal-btn-secondary {
      font-size: 0.82rem; font-weight: 600; color: var(--text-secondary);
      background: none; border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 16px; cursor: pointer; font-family: inherit;
    }
    .modal-btn-secondary:hover { background: #eef8ff; }
    .modal-btn-primary {
      font-size: 0.82rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #5BC4E8, #1f8ecd);
      border: none; border-radius: 999px; padding: 6px 18px;
      cursor: pointer; font-family: inherit;
    }
    .modal-btn-primary:hover { opacity: .88; }
    .list-title-hint { font-size: 0.73rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">NI<span>ANE</span></div>
    <nav>
      <a class="nav-item" href="#">
        <span class="nav-icon">🏠</span> Home
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">⏱</span> Pomodoro
      </a>
      <a class="nav-item active" href="#">
        <span class="nav-icon">✓</span> My Lists
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">📄</span> Notes
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">🎵</span> Música
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-item" href="#">
        <span class="nav-icon">👤</span> Usuário
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">⚙️</span> Configurações
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="content">
    <div class="list-titles" id="listTitles"></div>
    <div class="lists-row" id="listsRow"></div>
    <div class="create-area">
      <div class="create-btn" onclick="createList()">
        <div class="create-circle">+</div>
        <span>Criar nova lista</span>
      </div>
    </div>
  </main>
</div>

<!-- ========== CONTEXT MENU ========== -->
<div class="ctx-menu" id="ctxMenu" onclick="event.stopPropagation()">
  <div class="ctx-item" id="ctxRename" onclick="ctxRenameList()">✏️ Renomear lista</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" onclick="ctxDeleteList()">🗑️ Apagar lista</div>
</div>

<!-- ========== MODAL CONFIRMAR EXCLUSÃO ========== -->
<div class="modal-overlay" id="confirmDeleteModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h3>Apagar lista</h3>
      <button class="modal-close" onclick="document.getElementById('confirmDeleteModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <p id="confirmDeleteMsg" style="font-size:14px;color:var(--text-secondary);line-height:1.5"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn-secondary" onclick="document.getElementById('confirmDeleteModal').classList.remove('open')">Cancelar</button>
      <button class="modal-btn-delete" id="confirmDeleteBtn" style="margin-right:0">Apagar</button>
    </div>
  </div>
</div>

<!-- ========== MODAL CRIAR LISTA ========== -->
<div class="modal-overlay" id="createListModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Nova lista</h3>
      <button class="modal-close" onclick="closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Nome</label>
        <input type="text" id="new-list-name" placeholder="Ex: Lista de compras" maxlength="60">
        <p class="list-title-hint">Pressione Enter para confirmar</p>
      </div>
      <div class="modal-field">
        <label>Período (opcional)</label>
        <input type="text" id="new-list-period" placeholder="Ex: Seg - Sex">
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn-secondary" onclick="closeCreateModal()">Cancelar</button>
      <button class="modal-btn-primary" onclick="confirmCreateList()">Criar</button>
    </div>
  </div>
</div>

<!-- ========== MODAL DE EDIÇÃO ========== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Editar tarefa</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Título</label>
        <input type="text" id="edit-text" placeholder="Nome da tarefa">
      </div>
      <div class="modal-field">
        <label>Observações</label>
        <textarea id="edit-notes" placeholder="Detalhes, links, contexto..."></textarea>
      </div>
      <div class="modal-field-row">
        <div class="modal-field">
          <label>Data</label>
          <input type="date" id="edit-date">
        </div>
        <div class="modal-field">
          <label>Hora</label>
          <input type="time" id="edit-time">
        </div>
      </div>
      <div class="modal-field">
        <label>Prioridade</label>
        <select id="edit-priority">
          <option value="">Sem prioridade</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn-delete" onclick="deleteTask()">Excluir</button>
      <button class="modal-btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn-primary" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<script>
/* ===================== DATA ===================== */
let minhasListas = JSON.parse(localStorage.getItem('meuGerenciadorTarefas')) || [
  {
    titulo: "Lista 1",
    periodo: "Seg - quarta",
    tarefas: [
      { texto: "Comer pão de batata", concluida: true, data: "", hora: "", notes: "", priority: "" },
      { texto: "Estudar às 10 horas.", concluida: false, data: "", hora: "10:00", notes: "", priority: "alta" },
      { texto: "Vender pelúcia do tung tung sahur", concluida: false, data: "", hora: "", notes: "", priority: "" },
      { texto: "Academia às 15 horas", concluida: false, data: "", hora: "15:00", notes: "", priority: "baixa" }
    ]
  },
  {
    titulo: "Lista 2",
    periodo: "Quinta - Sexta",
    tarefas: [
      { texto: "Beber suco de maracujá", concluida: true, data: "", hora: "", notes: "", priority: "" },
      { texto: "Trabalhar das 8 hrs até as 18hrs.", concluida: true, data: "", hora: "08:00", notes: "", priority: "" },
      { texto: "Vender pelúcia do tralalero", concluida: false, data: "", hora: "", notes: "", priority: "media" },
      { texto: "Jogar free fire", concluida: false, data: "", hora: "", notes: "", priority: "" }
    ]
  },
  {
    titulo: "Lista 3",
    periodo: "",
    tarefas: []
  }
];

/* state do modal */
let editingList = -1;
let editingTask = -1;
let ctxListIdx = -1;

function salvar() {
  localStorage.setItem('meuGerenciadorTarefas', JSON.stringify(minhasListas));
}

/* ===================== FORMAT HELPERS ===================== */
function formatDateTime(data, hora) {
  let parts = [];
  if (data) {
    const d = new Date(data + 'T00:00:00');
    parts.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }));
  }
  if (hora) parts.push(hora);
  return parts.join(' · ');
}

/* ===================== RENDER ===================== */
function render() {
  const titlesEl = document.getElementById('listTitles');
  const rowEl = document.getElementById('listsRow');
  titlesEl.innerHTML = '';
  rowEl.innerHTML = '';

  minhasListas.forEach((lista, listaIdx) => {
    /* título */
    const h2 = document.createElement('h2');
    h2.className = 'list-title';
    h2.textContent = lista.titulo;
    h2.addEventListener('contextmenu', (e) => openCtxMenu(e, listaIdx));
    titlesEl.appendChild(h2);

    /* card */
    const card = document.createElement('div');
    card.className = 'list-card';
    card.addEventListener('contextmenu', (e) => {
      if (!e.target.closest('.task-item') && !e.target.closest('.add-task-area')) {
        openCtxMenu(e, listaIdx);
      }
    });

    if (lista.periodo) {
      const period = document.createElement('p');
      period.className = 'list-period';
      period.textContent = lista.periodo;
      card.appendChild(period);
    }

    /* tarefas pendentes */
    const pendentes = lista.tarefas.filter(t => !t.concluida);
    const concluidas = lista.tarefas.filter(t => t.concluida);

    const taskListEl = document.createElement('div');
    taskListEl.className = 'task-list';
    pendentes.forEach((tarefa) => {
      const realIdx = lista.tarefas.indexOf(tarefa);
      taskListEl.appendChild(buildTaskItem(tarefa, listaIdx, realIdx, false));
    });
    card.appendChild(taskListEl);

    /* seção de concluídas */
    if (concluidas.length > 0) {
      const doneSection = document.createElement('div');
      doneSection.className = 'done-section';

      const toggle = document.createElement('div');
      toggle.className = 'done-toggle';
      toggle.id = `done-toggle-${listaIdx}`;
      toggle.innerHTML = `<span class="arrow">▶</span> Concluída (${concluidas.length})`;
      toggle.addEventListener('click', () => toggleDoneSection(listaIdx));
      doneSection.appendChild(toggle);

      const doneList = document.createElement('div');
      doneList.className = 'done-list';
      doneList.id = `done-list-${listaIdx}`;
      concluidas.forEach((tarefa) => {
        const realIdx = lista.tarefas.indexOf(tarefa);
        doneList.appendChild(buildTaskItem(tarefa, listaIdx, realIdx, true));
      });
      doneSection.appendChild(doneList);
      card.appendChild(doneSection);
    }

    /* área de adicionar tarefa */
    card.appendChild(buildAddArea(listaIdx));
    rowEl.appendChild(card);
  });
}

function buildTaskItem(tarefa, listaIdx, tarefaIdx, isDone) {
  const item = document.createElement('div');
  item.className = `task-item ${isDone ? 'done' : ''}`;

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = tarefa.concluida;
  cb.addEventListener('change', (e) => handleToggle(e.target, listaIdx, tarefaIdx));
  cb.addEventListener('click', (e) => e.stopPropagation());

  const content = document.createElement('div');
  content.className = 'task-content';

  const textSpan = document.createElement('span');
  textSpan.className = 'task-text';
  textSpan.textContent = tarefa.texto;
  content.appendChild(textSpan);

  if (tarefa.notes) {
    const notesEl = document.createElement('div');
    notesEl.className = 'task-notes';
    notesEl.textContent = tarefa.notes;
    content.appendChild(notesEl);
  }

  const metaRow = document.createElement('div');
  metaRow.className = 'task-meta-row';

  const dtStr = formatDateTime(tarefa.data, tarefa.hora);
  if (dtStr) {
    const chip = document.createElement('span');
    chip.className = 'task-chip chip-date';
    chip.textContent = '📅 ' + dtStr;
    metaRow.appendChild(chip);
  }

  if (tarefa.priority) {
    const labels = { alta: 'Alta', media: 'Média', baixa: 'Baixa' };
    const chip = document.createElement('span');
    chip.className = `task-chip chip-priority ${tarefa.priority}`;
    chip.textContent = '⚑ ' + (labels[tarefa.priority] || tarefa.priority);
    metaRow.appendChild(chip);
  }

  if (metaRow.children.length) content.appendChild(metaRow);

  item.appendChild(cb);
  item.appendChild(content);

  /* clicar na tarefa (não no checkbox) abre modal de edição */
  item.addEventListener('click', () => openEditModal(listaIdx, tarefaIdx));

  return item;
}

function buildAddArea(listaIdx) {
  const area = document.createElement('div');
  area.className = 'add-task-area';
  area.id = `add-area-${listaIdx}`;

  /* botão simplificado */
  const simpleBtn = document.createElement('div');
  simpleBtn.className = 'add-task-simple';
  simpleBtn.id = `add-simple-${listaIdx}`;
  simpleBtn.innerHTML = `<span class="plus">+</span> Adicionar uma tarefa`;
  simpleBtn.addEventListener('click', () => openComposer(listaIdx));
  area.appendChild(simpleBtn);

  /* composer expandido */
  const composerWrap = document.createElement('div');
  composerWrap.className = 'task-composer-wrap';
  composerWrap.id = `composer-${listaIdx}`;
  composerWrap.innerHTML = `
    <div class="task-composer">
      <input type="text" class="task-title-input" id="input-text-${listaIdx}" placeholder="Título da tarefa">
      <textarea class="task-notes-input" id="input-notes-${listaIdx}" placeholder="Observações" rows="2"></textarea>

      <div class="date-picker-row" id="date-row-${listaIdx}">
        <label>📅</label>
        <input type="date" id="input-date-${listaIdx}">
        <label>⏰</label>
        <input type="time" id="input-time-${listaIdx}">
      </div>

      <div class="priority-row" id="priority-row-${listaIdx}">
        <label>⚑ Prioridade:</label>
        <select id="input-priority-${listaIdx}">
          <option value="">Sem prioridade</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>

      <div class="composer-meta">
        <button type="button" class="meta-btn" id="btn-date-${listaIdx}" onclick="toggleDatePicker(${listaIdx})">📅 Data / Hora</button>
        <button type="button" class="meta-btn" id="btn-priority-${listaIdx}" onclick="togglePriorityPicker(${listaIdx})">⚑ Prioridade</button>
      </div>

      <div class="composer-footer">
        <button type="button" class="btn-cancel" onclick="closeComposer(${listaIdx})">Cancelar</button>
        <button type="button" class="btn-add" onclick="addTask(${listaIdx})">Adicionar</button>
      </div>
    </div>
  `;
  area.appendChild(composerWrap);

  /* Enter para adicionar */
  setTimeout(() => {
    const inp = document.getElementById(`input-text-${listaIdx}`);
    if (inp) inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(listaIdx); }
    });
  }, 0);

  return area;
}

/* ===================== COMPOSER ===================== */
function openComposer(listaIdx) {
  document.getElementById(`add-simple-${listaIdx}`).style.display = 'none';
  document.getElementById(`composer-${listaIdx}`).classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById(`input-text-${listaIdx}`);
    if (inp) inp.focus();
  }, 50);
}

function closeComposer(listaIdx) {
  document.getElementById(`add-simple-${listaIdx}`).style.display = '';
  document.getElementById(`composer-${listaIdx}`).classList.remove('open');
  /* limpar campos */
  ['input-text-', 'input-notes-', 'input-date-', 'input-time-'].forEach(p => {
    const el = document.getElementById(p + listaIdx);
    if (el) el.value = '';
  });
  const pr = document.getElementById(`input-priority-${listaIdx}`);
  if (pr) pr.value = '';
  const dr = document.getElementById(`date-row-${listaIdx}`);
  if (dr) dr.classList.remove('open');
  const prr = document.getElementById(`priority-row-${listaIdx}`);
  if (prr) prr.classList.remove('open');
  const btnD = document.getElementById(`btn-date-${listaIdx}`);
  if (btnD) btnD.classList.remove('active');
  const btnP = document.getElementById(`btn-priority-${listaIdx}`);
  if (btnP) btnP.classList.remove('active');
}

function toggleDatePicker(listaIdx) {
  const row = document.getElementById(`date-row-${listaIdx}`);
  const btn = document.getElementById(`btn-date-${listaIdx}`);
  row.classList.toggle('open');
  btn.classList.toggle('active');
}

function togglePriorityPicker(listaIdx) {
  const row = document.getElementById(`priority-row-${listaIdx}`);
  const btn = document.getElementById(`btn-priority-${listaIdx}`);
  row.classList.toggle('open');
  btn.classList.toggle('active');
}

function addTask(listaIdx) {
  const texto = document.getElementById(`input-text-${listaIdx}`)?.value.trim();
  if (!texto) return;
  minhasListas[listaIdx].tarefas.push({
    texto,
    concluida: false,
    data: document.getElementById(`input-date-${listaIdx}`)?.value || '',
    hora: document.getElementById(`input-time-${listaIdx}`)?.value || '',
    notes: document.getElementById(`input-notes-${listaIdx}`)?.value.trim() || '',
    priority: document.getElementById(`input-priority-${listaIdx}`)?.value || ''
  });
  salvar();
  render();
}

/* ===================== TOGGLE CONCLUÍDA ===================== */
function handleToggle(checkbox, listaIdx, tarefaIdx) {
  const item = checkbox.closest('.task-item');
  minhasListas[listaIdx].tarefas[tarefaIdx].concluida = checkbox.checked;
  salvar();
  if (checkbox.checked) {
    item.classList.add('task-fade-out');
    setTimeout(render, 400);
  } else {
    render();
  }
}

/* ===================== TOGGLE SEÇÃO CONCLUÍDAS ===================== */
function toggleDoneSection(listaIdx) {
  const toggle = document.getElementById(`done-toggle-${listaIdx}`);
  const list = document.getElementById(`done-list-${listaIdx}`);
  toggle.classList.toggle('open');
  list.classList.toggle('visible');
}

/* ===================== CRIAR LISTA ===================== */
function createList() {
  document.getElementById('new-list-name').value = '';
  document.getElementById('new-list-period').value = '';
  document.getElementById('createListModal').classList.add('open');
  setTimeout(() => document.getElementById('new-list-name').focus(), 80);
}

function closeCreateModal() {
  document.getElementById('createListModal').classList.remove('open');
}

function confirmCreateList() {
  const nome = document.getElementById('new-list-name').value.trim();
  if (!nome) return;
  const periodo = document.getElementById('new-list-period').value.trim();
  minhasListas.push({ titulo: nome, periodo, tarefas: [] });
  salvar();
  closeCreateModal();
  render();
}

document.getElementById('createListModal').addEventListener('click', function(e) {
  if (e.target === this) closeCreateModal();
});

document.getElementById('new-list-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmCreateList();
});

/* ===================== CONTEXT MENU ===================== */
function openCtxMenu(e, listaIdx) {
  e.preventDefault();
  ctxListIdx = listaIdx;
  const menu = document.getElementById('ctxMenu');
  menu.classList.add('open');
  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - 120);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function closeCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('open');
}

function ctxDeleteList() {
  const idx = ctxListIdx;
  closeCtxMenu();
  if (idx < 0) return;
  const nome = minhasListas[idx].titulo;
  document.getElementById('confirmDeleteMsg').textContent = `Tem certeza que quer apagar "${nome}" e todas as suas tarefas? Essa ação não pode ser desfeita.`;
  document.getElementById('confirmDeleteBtn').onclick = function() {
    minhasListas.splice(idx, 1);
    salvar();
    render();
    ctxListIdx = -1;
    document.getElementById('confirmDeleteModal').classList.remove('open');
  };
  document.getElementById('confirmDeleteModal').classList.add('open');
}

function ctxRenameList() {
  closeCtxMenu();
  if (ctxListIdx < 0) return;
  const nomeAtual = minhasListas[ctxListIdx].titulo;
  document.getElementById('new-list-name').value = nomeAtual;
  document.getElementById('new-list-period').value = minhasListas[ctxListIdx].periodo || '';
  document.getElementById('createListModal').classList.add('open');
  document.querySelector('#createListModal h3').textContent = 'Renomear lista';
  setTimeout(() => {
    const inp = document.getElementById('new-list-name');
    inp.focus();
    inp.select();
  }, 80);
  /* troca o confirm para renomear */
  document.querySelector('#createListModal .modal-btn-primary').onclick = function() {
    const nome = document.getElementById('new-list-name').value.trim();
    if (!nome) return;
    minhasListas[ctxListIdx].titulo = nome;
    minhasListas[ctxListIdx].periodo = document.getElementById('new-list-period').value.trim();
    salvar();
    closeCreateModal();
    document.querySelector('#createListModal h3').textContent = 'Nova lista';
    document.querySelector('#createListModal .modal-btn-primary').onclick = confirmCreateList;
    render();
    ctxListIdx = -1;
  };
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctxMenu')) closeCtxMenu();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeCtxMenu(); closeCreateModal(); closeModal(); }
});

/* ===================== MODAL DE EDIÇÃO ===================== */
function openEditModal(listaIdx, tarefaIdx) {
  const tarefa = minhasListas[listaIdx].tarefas[tarefaIdx];
  editingList = listaIdx;
  editingTask = tarefaIdx;

  document.getElementById('edit-text').value = tarefa.texto || '';
  document.getElementById('edit-notes').value = tarefa.notes || '';
  document.getElementById('edit-date').value = tarefa.data || '';
  document.getElementById('edit-time').value = tarefa.hora || '';
  document.getElementById('edit-priority').value = tarefa.priority || '';

  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('edit-text').focus(), 80);
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editingList = -1;
  editingTask = -1;
}

function saveEdit() {
  if (editingList < 0 || editingTask < 0) return;
  const tarefa = minhasListas[editingList].tarefas[editingTask];
  const texto = document.getElementById('edit-text').value.trim();
  if (!texto) return;
  tarefa.texto = texto;
  tarefa.notes = document.getElementById('edit-notes').value.trim();
  tarefa.data = document.getElementById('edit-date').value;
  tarefa.hora = document.getElementById('edit-time').value;
  tarefa.priority = document.getElementById('edit-priority').value;
  salvar();
  closeModal();
  render();
}

function deleteTask() {
  if (editingList < 0 || editingTask < 0) return;
  if (!confirm('Excluir esta tarefa?')) return;
  minhasListas[editingList].tarefas.splice(editingTask, 1);
  salvar();
  closeModal();
  render();
}

/* fechar modal clicando fora */
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* init */
render();
</script>
</body>
</html>
