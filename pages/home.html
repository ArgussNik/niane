<!DOCTYPE html>
<html lang="en">
<head>
  <title>NIANE — Produtividade</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="shortcut icon" href="../assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">

  <!-- Aplica o tema salvo ANTES do CSS carregar, para a página (e a sidebar)
       já nascerem com a cor certa em qualquer página, não só na Home. -->
  <script src="../js/niane-theme-init.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/home.css">
</head>
<body>

  <!-- SideBar Branco -->
  <aside class="sidebar">
    <div class="logo">NI<span>ANE</span></div>
    <nav>
      <a class="nav-item active" href="home.html">🏠 Home</a>
      <a class="nav-item" href="pomodoro.html">⏱ Pomodoro</a>
      <a class="nav-item" href="lists.html">✓ My Lists</a>
      <a class="nav-item" href="notes.html">📄 Notes</a>
      <a class="nav-item" href="music.html">🎵 Música</a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-item" href="#" id="nav-usuario">👤 Usuário</a>
      <a class="nav-item" href="#" id="nav-config">⚙️ Configurações</a>
    </div>
  </aside>




  <main>
    <div class="home-left-panel">
      <div style="text-align: left; margin-bottom: 20px;">
        Tempo Total de Pomodoro: <br>
        Horas: <span id="pomodoro-horas">0</span> | Minutos: <span id="pomodoro-minutos">0</span>
      </div>

      <div class="progress-toggle" id="progress-toggle">
        <button type="button" class="progress-toggle-btn" data-mode="listas">Listas</button>
        <button type="button" class="progress-toggle-btn" data-mode="tarefas">Tarefas</button>
      </div>
    </div>

    <div class="circle-1" id="outer-circle">
      <div class="circle-2">
        <span class="prog-num" id="percentage-text">0%</span>
        <span class="prog-label" id="percentage-label">Progresso de Listas</span>
      </div>
    </div>
  </main>
  


<!-- SideBar Azul -->
  <aside class="sidebar2">
    <h2 class="sidebar2-title">Listas</h2>

    <!-- Preenchido dinamicamente via JS, sincronizado com listas.html -->
    <div id="done-list"></div>

    <div class="done-total-box">
      <span id="task-count" style="font-size: 2.5rem; font-weight: 800; display: block;">0</span>
      <p id="task-count-label" style="font-size: 0.8rem; opacity: 0.9;">LISTAS PRONTAS</p>
    </div>
  </aside>

  <script src="../js/home.js"></script>
  <script src="../js/niane-shared.js" defer></script>
</body>
</html>
