<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIANE — Produtividade</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="shortcut icon" href="../assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">

  <!-- Aplica o tema salvo ANTES do CSS carregar, para a sidebar já nascer
       com a cor customizada (mesmo tema usado em todas as outras páginas). -->
  <script src="../js/niane-theme-init.js"></script>

  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/music.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">NI<span>ANE</span></div>
    <nav>
      <a class="nav-item" href="home.html">
        <span class="nav-icon">🏠</span> Home
      </a>
      <a class="nav-item" href="pomodoro.html">
        <span class="nav-icon">⏱</span> Pomodoro
      </a>
      <a class="nav-item" href="lists.html">
        <span class="nav-icon">✓</span> My Lists
      </a>
      <a class="nav-item" href="notes.html"> 
        <span class="nav-icon">📄</span> Notes
      </a>
      <a class="nav-item active" href="music.html">
        <span class="nav-icon">🎵</span> Música
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-item" href="#" id="nav-usuario">
        <span class="nav-icon">👤</span> Usuário
      </a>
      <a class="nav-item" href="#" id="nav-config">
        <span class="nav-icon">⚙️</span> Configurações
      </a>
    </div>
  </aside>

<main class="main-content">
  <section class="music-container">
    <div class="controls">
      <input type="text" id="playlist-url" placeholder="Cole o link do álbum, playlist ou música aqui...">
      <button id="load-btn">Carregar</button>
    </div>
    <div id="embed-iframe"></div>
  </section>

  <section class="ambient-container">
    <div class="ambient-header">
      <span class="ambient-title">SONS AMBIENTES</span>
      <span class="ambient-hint">Toque para tocar/pausar</span>
    </div>
    <div class="ambient-grid">
      <button type="button" class="ambient-btn" id="ambient-calmaria" data-type="calmaria">
        <span class="ambient-icon">🌧️</span>
        <span class="ambient-name">Calmaria</span>
        <span class="ambient-status">Chuva suave</span>
      </button>
      <button type="button" class="ambient-btn" id="ambient-natureza" data-type="natureza">
        <span class="ambient-icon">🌿</span>
        <span class="ambient-name">Natureza</span>
        <span class="ambient-status">Vento e folhas</span>
      </button>
      <button type="button" class="ambient-btn" id="ambient-foco" data-type="foco">
        <span class="ambient-icon">🎯</span>
        <span class="ambient-name">Foco</span>
        <span class="ambient-status">Ruído grave contínuo</span>
      </button>
    </div>
  </section>

  <section class="mp3-container">
    <div class="mp3-header">
      <span class="mp3-title">PLAYER DE ÁUDIO LOCAL</span>
      <label for="mp3-input" class="custom-file-upload">Selecionar MP3</label>
      <input type="file" id="mp3-input" accept="audio/mp3" style="display: none;" />
    </div>
    <audio id="local-player" controls></audio>
  </section>

  <div class="lists-area" id="listsArea"></div>
</main>

<script src="../js/music.js"></script>
<script src="../js/niane-shared.js" defer></script>
</body>
</html>
